<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - CricketPro</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <!-- User Auth Section -->
    <section class="user-auth-section">
        <div class="user-auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <h1>Cricket<span>Pro</span></h1>
                    <p>Your Cricket Equipment Partner</p>
                </div>
                
                <!-- Login Form -->
                <div class="auth-form-container" id="loginForm">
                    <h2>Welcome Back!</h2>
                    <p class="auth-subtitle">Login to your account</p>
                    
                    <form class="auth-form" id="loginFormElement">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="loginEmail" required placeholder="Enter your email">
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" required placeholder="Enter your password">
                        </div>
                        
                        <div class="error-message" id="loginError"></div>
                        
                        <button type="submit" class="btn-auth">Login</button>
                    </form>
                    
                    <div class="auth-switch">
                        <p>Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
                    </div>
                </div>
                
                <!-- Signup Form -->
                <div class="auth-form-container" id="signupForm" style="display: none;">
                    <h2>Create Account</h2>
                    <p class="auth-subtitle">Join CricketPro today</p>
                    
                    <form class="auth-form" id="signupFormElement">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="signupName" required placeholder="Enter your full name">
                        </div>
                        
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="signupEmail" required placeholder="Enter your email">
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="signupPhone" required placeholder="Enter your phone number">
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="signupPassword" required placeholder="Create a password" minlength="6">
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="signupConfirmPassword" required placeholder="Confirm your password">
                        </div>
                        
                        <div class="error-message" id="signupError"></div>
                        
                        <button type="submit" class="btn-auth">Create Account</button>
                    </form>
                    
                    <div class="auth-switch">
                        <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
                    </div>
                </div>
                
                <a href="index.html" class="back-to-site">← Back to Website</a>
            </div>
        </div>
    </section>

    <script src="styles/js/user-auth.js"></script>
    <script>
        // Show signup form
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }

        // Show login form
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        // Login form submit
        document.getElementById('loginFormElement').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            const result = loginUser(email, password);
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errorEl.textContent = result.message;
                errorEl.style.display = 'block';
                
                setTimeout(() => {
                    errorEl.style.display = 'none';
                }, 3000);
            }
        });

        // Signup form submit
        document.getElementById('signupFormElement').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('signupPhone').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const errorEl = document.getElementById('signupError');
            
            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match!';
                errorEl.style.display = 'block';
                setTimeout(() => errorEl.style.display = 'none', 3000);
                return;
            }
            
            const result = registerUser({ name, email, phone, password });
            
            if (result.success) {
                alert('Account created successfully! Please login.');
                showLogin();
            } else {
                errorEl.textContent = result.message;
                errorEl.style.display = 'block';
                setTimeout(() => errorEl.style.display = 'none', 3000);
            }
        });

        // Check if already logged in
        if (isUserLoggedIn()) {
            window.location.href = 'my-account.html';
        }
    </script>
</body>
</html>
